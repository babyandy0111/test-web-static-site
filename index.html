<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athens 26 Flashlight Effect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; }
        .ui-overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.8);
            z-index: 10;
        }
        .instruction {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1 class="text-3xl font-light tracking-widest uppercase">Athens 2026</h1>
        <p class="text-xs opacity-50 mt-1 italic">The Light of Civilization</p>
    </div>

    <div class="instruction uppercase">移動滑鼠或觸控螢幕來探索</div>

    <script>
        // 這個 Vertex Shader 很簡單，只是把位置傳給 Fragment Shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // 核心邏輯：Fragment Shader
        // 這裡會根據圖片的亮度計算「法線」來模擬凹凸感
        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform vec2 uMouse;
            uniform vec2 uResolution;
            uniform float uTime;
            varying vec2 vUv;

            void main() {
                vec2 uv = vUv;
                
                // 1. 採樣原始圖像
                vec4 tex = texture2D(tDiffuse, uv);
                
                // 2. 計算法線 (Normal Map Simulation)
                // 透過採樣相鄰像素的亮度差來取得表面斜率
                float texelSize = 0.002;
                float h = dot(tex.rgb, vec3(0.299, 0.587, 0.114)); // 轉灰階作為高度
                
                float hRight = dot(texture2D(tDiffuse, uv + vec2(texelSize, 0.0)).rgb, vec3(0.299, 0.587, 0.114));
                float hUp = dot(texture2D(tDiffuse, uv + vec2(0.0, texelSize)).rgb, vec3(0.299, 0.587, 0.114));
                
                vec3 normal = normalize(vec3((h - hRight) * 10.0, (h - hUp) * 10.0, 0.5));

                // 3. 計算光照
                // 手電筒位置 (將滑鼠座標轉換為螢幕空間)
                vec2 lightPos = uMouse;
                vec3 lightDir = normalize(vec3(lightPos - uv, 0.15)); // Z軸決定光的高度
                
                // 蘭伯特餘弦定律 (Lambert's Cosine Law)
                float diff = max(dot(normal, lightDir), 0.0);
                
                // 4. 手電筒光圈效果 (距離衰減)
                float dist = distance(uv * uResolution/uResolution.y, lightPos * uResolution/uResolution.y);
                float radius = 0.25;
                float falloff = smoothstep(radius, 0.0, dist);
                
                // 5. 高光效果 (Specular)
                vec3 viewDir = vec3(0.0, 0.0, 1.0);
                vec3 reflectDir = reflect(-lightDir, normal);
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);
                
                // 6. 混合環境光與手電筒光
                vec3 ambient = tex.rgb * 0.03; // 極暗的背景
                vec3 flashlight = tex.rgb * diff * 2.5 + (spec * 0.4);
                
                vec3 finalColor = ambient + (flashlight * falloff);
                
                // 加入一點膠卷顆粒感
                float noise = (fract(sin(dot(uv, vec2(12.9898,78.233)*uTime)) * 43758.5453) - 0.5) * 0.05;
                finalColor += noise * falloff;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        let scene, camera, renderer, mesh, material;
        let mouse = new THREE.Vector2(0.5, 0.5);
        let targetMouse = new THREE.Vector2(0.5, 0.5);

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 載入紋理 (使用 Placeholder 模擬希臘壁畫風格)
            // 實務上這裡會換成你想要的那張壁畫
            const loader = new THREE.TextureLoader();
            const textureUrl = 'https://images.unsplash.com/photo-1605142859862-978be7eba909?auto=format&fit=crop&q=80&w=2000';
            
            loader.load(textureUrl, (texture) => {
                setupMesh(texture);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove);
        }

        function setupMesh(texture) {
            const geometry = new THREE.PlaneGeometry(2, 2);
            material = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse: { value: texture },
                    uMouse: { value: new THREE.Vector2(0.5, 0.5) },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    uTime: { value: 0 }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            animate();
        }

        function onMouseMove(e) {
            targetMouse.x = e.clientX / window.innerWidth;
            targetMouse.y = 1.0 - (e.clientY / window.innerHeight);
        }

        function onTouchMove(e) {
            if (e.touches.length > 0) {
                targetMouse.x = e.touches[0].clientX / window.innerWidth;
                targetMouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
            }
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (material) {
                material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 平滑滑鼠移動 (Lerp)
            mouse.x += (targetMouse.x - mouse.x) * 0.1;
            mouse.y += (targetMouse.y - mouse.y) * 0.1;
            
            if (material) {
                material.uniforms.uMouse.value.copy(mouse);
                material.uniforms.uTime.value += 0.01;
            }
            
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
